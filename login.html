<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Login simulado da AeroSwift para acessar o simulador de passagens." />
    <title>AeroSwift | Login</title>
    <link rel="icon" href="images/logo-aeroswift.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style/login-register.css" />
  </head>
  <body>
    <main class="auth-shell">
      <section class="auth-panel" aria-labelledby="login-title">
        <a class="brand" href="index.html" aria-label="AeroSwift - página inicial">
          <img src="images/logo-aeroswift.png" alt="AeroSwift" />
        </a>
        <p class="eyebrow">Área do cliente</p>
        <h1 id="login-title">Entre para simular sua passagem.</h1>
        <p class="auth-copy">
          Use uma conta cadastrada neste navegador. Este login usa localStorage
          apenas para fins de demonstração.
        </p>

        <form id="login-form" class="auth-form" novalidate>
          <label for="email">
            Email
            <input id="email" name="email" type="email" autocomplete="email" required />
          </label>
          <label for="password">
            Senha
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              minlength="8"
              required
            />
          </label>
          <p class="message" id="auth-message" role="status" aria-live="polite"></p>
          <button type="submit">Entrar</button>
        </form>

        <p class="auth-link">Não tem uma conta? <a href="register.html">Cadastre-se</a></p>
      </section>
    </main>

    <script src="scripts/script.js"></script>
  </body>
</html>
